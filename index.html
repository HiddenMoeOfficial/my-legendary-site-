<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Random Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
    }

    #score {
        font-size: 24px;
        margin-top: 20px;
    }

    #target {
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
    }

    #footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="target"></div>
<div id="footer">Made by Moe</div>

<script>
let score = 0;
const target = document.getElementById("target");
const scoreDisplay = document.getElementById("score");

function moveTarget() {
    const x = Math.random() * (window.innerWidth - 50);
    const y = Math.random() * (window.innerHeight - 50);
    target.style.left = x + "px";
    target.style.top = y + "px";
}

target.addEventListener("click", () => {
    score++;
    scoreDisplay.textContent = "Score: " + score;
    moveTarget();
});

// Startposition
moveTarget();
</script>

</body>
</html>
